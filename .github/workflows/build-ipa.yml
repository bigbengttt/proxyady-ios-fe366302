name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer || true
          xcodebuild -version
          find . -maxdepth 4 -name "*.xcodeproj" -type d -print
          find . -maxdepth 6 -name "*.xcscheme" -type f -print

      - name: Build unsigned app
        run: |
          set -o pipefail
          PROJECT_PATH="ProxyADY.xcodeproj"
          if [ ! -d "$PROJECT_PATH" ]; then
            PROJECT_PATH=$(find . -name "*.xcodeproj" -type d | head -n 1)
          fi
          echo "PROJECT_PATH=$PROJECT_PATH"

          set +e
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme ProxyADY \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            SWIFT_OPTIMIZATION_LEVEL="-Osize" \
            GCC_OPTIMIZATION_LEVEL=s \
            DEBUG_INFORMATION_FORMAT=dwarf \
            STRIP_INSTALLED_PRODUCT=YES \
            COPY_PHASE_STRIP=YES \
            clean build 2>&1 | tee xcodebuild.log
          BUILD_STATUS=${PIPESTATUS[0]}
          set -e
          grep -n "error:" xcodebuild.log | tail -80 || true
          if [ "$BUILD_STATUS" -ne 0 ]; then
            echo "ERRO: xcodebuild falhou ($BUILD_STATUS). Veja xcodebuild.log no artifact build_logs." | tee ipa_error.txt
            exit "$BUILD_STATUS"
          fi

          echo "Apps gerados:"
          find DerivedData -name "*.app" -type d -print | tee apps_found.txt

      - name: Package unsigned IPA
        run: |
          set -e
          rm -rf Payload unsigned_ipa unsigned.ipa
          mkdir -p Payload unsigned_ipa

          APP_PATH=$(find DerivedData -path "*/Release-iphoneos/*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find DerivedData -name "*.app" -type d | head -n 1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "ERRO: nenhum .app encontrado" | tee ipa_error.txt
            exit 1
          fi

          echo "APP_PATH=$APP_PATH"
          du -sh "$APP_PATH"
          cp -R "$APP_PATH" Payload/

          /usr/bin/zip -qry unsigned_ipa/unsigned.ipa Payload
          cp unsigned_ipa/unsigned.ipa unsigned.ipa

          echo "Tamanho IPA:"
          ls -lh unsigned.ipa unsigned_ipa/unsigned.ipa
          BYTES=$(stat -f%z unsigned.ipa)
          if [ "$BYTES" -lt 1000000 ]; then
            echo "ERRO: IPA pequena demais ($BYTES bytes). Build inválido." | tee ipa_error.txt
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned_ipa
          path: unsigned_ipa/unsigned.ipa
          if-no-files-found: error

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build_logs
          path: |
            xcodebuild.log
            apps_found.txt
            ipa_error.txt
          if-no-files-found: ignore

      - name: Send IPA Telegram
        if: success()
        shell: bash
        run: |
          CHAT_ID="$(cat .telegram_chat_id)"
          curl -F chat_id="$CHAT_ID" \
               -F document=@unsigned_ipa/unsigned.ipa \
               -F caption="✅ IPA gerada com sucesso" \
               "https://api.telegram.org/bot7962247027:AAGWeYDX7pjjgfcz0LVKNnneF7tBcx3EL-Y/sendDocument"
