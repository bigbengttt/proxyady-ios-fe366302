name: Build IPA Unsigned
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build IPA
        shell: bash
        run: |
          set -e
          PROJECT=$(find . -name "*.xcodeproj" | head -n 1)
          SCHEME=$(xcodebuild -list -project "$PROJECT" | awk '/Schemes:/{flag=1;next} flag && NF {print $1; exit}')
          xcodebuild -project "$PROJECT" -scheme "$SCHEME" -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" clean build
          APP=$(find build -type d -name "*.app" | head -n 1)
          rm -rf Payload unsigned_ipa
          mkdir -p Payload unsigned_ipa
          cp -R "$APP" Payload/
          zip -qry unsigned_ipa/unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: unsigned_ipa
          path: unsigned_ipa/unsigned.ipa

      - name: Send IPA Telegram
        shell: bash
        run: |
          curl -f -F chat_id="6236646082" \
               -F document=@unsigned_ipa/unsigned.ipa \
               -F caption="✅ IPA gerada com sucesso" \
               "https://api.telegram.org/bot7962247027:AAGWeYDX7pjjgfcz0LVKNnneF7tBcx3EL-Y/sendDocument"
