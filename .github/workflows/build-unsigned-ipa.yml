name: Build Unsigned IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: xcodebuild -list -project ProxyADY.xcodeproj

      - name: Build unsigned app
        run: |
          set -e
          xcodebuild \
            -project ProxyADY.xcodeproj \
            -scheme ProxyADY \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package IPA
        run: |
          set -e
          APP=$(find build -name "ProxyADY.app" -type d | head -n 1)
          test -n "$APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          /usr/bin/zip -r ProxyADY.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyADY-unsigned-ipa
          path: ProxyADY.ipa
